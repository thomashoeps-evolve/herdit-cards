<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Stack</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a1628;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .stack-wrapper {
    position: relative;
    width: 380px;
    height: 260px;
  }

  /* ── Cards ───────────────────────────────────────────────────────────── */
  .card {
    position: absolute;
    width: 340px;
    height: 220px;
    border-radius: 2px;
    background: #0f2040;
    border: 1px solid rgba(74,144,217,0.2);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.5s cubic-bezier(0.22,1,0.36,1),
                opacity  0.5s cubic-bezier(0.22,1,0.36,1),
                box-shadow 0.3s ease;
    will-change: transform, opacity;
  }

  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Placeholder card content */
  .card-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: linear-gradient(135deg, #0a1628 0%, #0f2040 100%);
  }

  .card-placeholder-label {
    font-family: 'DM Mono', monospace, sans-serif;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: #4a6080;
    text-transform: uppercase;
  }

  .card-placeholder-num {
    font-family: 'Syne', sans-serif, serif;
    font-size: 48px;
    font-weight: 800;
    color: rgba(74,144,217,0.15);
    line-height: 1;
  }

  /* Stack positions — 4 cards */
  /* pos 0 = front, pos 3 = back */
  .card[data-pos="0"] {
    transform: translate(0px, 0px) rotate(0deg);
    opacity: 1;
    z-index: 4;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .card[data-pos="1"] {
    transform: translate(16px, -12px) rotate(2deg);
    opacity: 0.85;
    z-index: 3;
  }
  .card[data-pos="2"] {
    transform: translate(28px, -22px) rotate(4deg);
    opacity: 0.6;
    z-index: 2;
  }
  .card[data-pos="3"] {
    transform: translate(38px, -30px) rotate(6deg);
    opacity: 0.35;
    z-index: 1;
  }

  /* ── Arrow button ─────────────────────────────────────────────────────── */
  .stack-arrow {
    position: absolute;
    bottom: 0px;
    right: 0px;
    width: 36px;
    height: 36px;
    background: #050b18;
    border: 1px solid rgba(74,144,217,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 10;
    transition: all 0.2s ease;
  }

  .stack-arrow:hover {
    background: #4a90d9;
    border-color: #4a90d9;
  }

  .stack-arrow:hover svg path {
    stroke: #050b18;
  }

  .stack-arrow svg {
    width: 16px;
    height: 16px;
  }

  .stack-arrow svg path {
    stroke: #4a90d9;
    stroke-width: 1.5;
    fill: none;
    transition: stroke 0.2s ease;
  }

  /* ── Counter ─────────────────────────────────────────────────────────── */
  .stack-counter {
    position: absolute;
    bottom: 8px;
    left: 0px;
    font-family: 'DM Mono', monospace, sans-serif;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: #4a6080;
    z-index: 10;
  }
</style>
</head>
<body>

<div class="stack-wrapper">

  <!-- Cards — data-pos controls visual position in stack -->
  <div class="card" data-pos="0" data-index="0">
    <div class="card-placeholder">
      <div class="card-placeholder-num">01</div>
      <div class="card-placeholder-label">Homepage</div>
    </div>
  </div>

  <div class="card" data-pos="1" data-index="1">
    <div class="card-placeholder">
      <div class="card-placeholder-num">02</div>
      <div class="card-placeholder-label">Services Page</div>
    </div>
  </div>

  <div class="card" data-pos="2" data-index="2">
    <div class="card-placeholder">
      <div class="card-placeholder-num">03</div>
      <div class="card-placeholder-label">Contact Page</div>
    </div>
  </div>

  <div class="card" data-pos="3" data-index="3">
    <div class="card-placeholder">
      <div class="card-placeholder-num">04</div>
      <div class="card-placeholder-label">Mobile View</div>
    </div>
  </div>

  <!-- Arrow -->
  <div class="stack-arrow" id="next-btn">
    <svg viewBox="0 0 16 16">
      <path d="M3 8h10M9 4l4 4-4 4"/>
    </svg>
  </div>

  <!-- Counter -->
  <div class="stack-counter" id="counter">01 / 04</div>

</div>

<script>
  const cards = Array.from(document.querySelectorAll('.card'));
  const counter = document.getElementById('counter');
  const btn = document.getElementById('next-btn');
  const TOTAL = cards.length;
  let current = 0; // index of front card

  function updatePositions() {
    cards.forEach((card, i) => {
      // Calculate relative position from current front
      const pos = (i - current + TOTAL) % TOTAL;
      card.setAttribute('data-pos', pos);
    });
    counter.textContent = String(current + 1).padStart(2, '0') + ' / ' + String(TOTAL).padStart(2, '0');
  }

  function next() {
    // Front card flies to back
    const frontCard = cards[current];

    // Animate out: fly left and down
    frontCard.style.transition = 'transform 0.45s cubic-bezier(0.22,1,0.36,1), opacity 0.45s ease';
    frontCard.style.transform = 'translate(-60px, 40px) rotate(-8deg)';
    frontCard.style.opacity = '0';

    setTimeout(() => {
      // Reset transition, move to back position
      frontCard.style.transition = 'none';
      current = (current + 1) % TOTAL;
      updatePositions();
      // Force reflow
      frontCard.getBoundingClientRect();
      // Re-enable transitions
      frontCard.style.transition = '';
      frontCard.style.transform = '';
      frontCard.style.opacity = '';
    }, 350);
  }

  btn.addEventListener('click', next);

  // Also click front card to advance
  cards.forEach(card => {
    card.addEventListener('click', function() {
      if (this.getAttribute('data-pos') === '0') next();
    });
  });
</script>

</body>
</html>
